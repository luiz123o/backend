version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subscription-manager-api
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    networks:
      - subscription-network
    # Habilitar para depuração
    # command: npm run start:debug
    # expose:
    #   - 9229

  postgres:
    image: postgres:15
    container_name: subscription-manager-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-subscription_manager}
      TZ: "America/Sao_Paulo"
      PGTZ: "America/Sao_Paulo"
    volumes:
      - ./docker/volumes/postgres:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
      - ./docker/scripts:/scripts
      - ./docker/volumes/backups:/backup
    networks:
      - subscription-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço de backup do PostgreSQL (execução única)
  postgres-backup:
    image: postgres:15
    container_name: subscription-manager-postgres-backup
    depends_on:
      - postgres
    volumes:
      - ./docker/scripts:/scripts
      - ./docker/volumes/backups:/backup
    networks:
      - subscription-network
    command: /bin/bash -c "sleep 30 && /scripts/backup-postgres.sh"
    deploy:
      restart_policy:
        condition: none

  # Serviço de backup automático (agendado)
  postgres-backup-cron:
    image: postgres:15
    container_name: subscription-manager-postgres-backup-cron
    depends_on:
      - postgres
    volumes:
      - ./docker/scripts:/scripts
      - ./docker/volumes/backups:/backup
    networks:
      - subscription-network
    environment:
      TZ: "America/Sao_Paulo"
    command: >
      bash -c "
        apt-get update && apt-get -y install cron
        crontab /scripts/crontab
        mkdir -p /var/log
        touch /var/log/cron.log
        cron && tail -f /var/log/cron.log
      "
    restart: always

  redis:
    image: redis:7-alpine
    container_name: subscription-manager-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./docker/volumes/redis:/data
    networks:
      - subscription-network
    command: redis-server --appendonly yes

  # Serviço opcional para administração do PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: subscription-manager-pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./docker/volumes/pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - subscription-network

networks:
  subscription-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:
  postgres-backups:
